<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCO Digital - Painel</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>RCO Digital</h1>
            <nav class="nav-menu">
                <a href="dashboard.html" class="active">Turmas</a>
                <a href="frequencias.html">Frequências</a>
                <a href="grupos.html">Grupos</a>
                <a href="comportamento.html">Comportamento</a>
                <a href="materiais.html">Materiais</a>
                <a href="emprestimos.html">Empréstimos</a>
            </nav>
            <button id="btnLogout" class="btn-logout">Sair</button>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Carregando seus dados...</p>
        </div>

        <div id="content" class="content" style="display: none;">

            <!-- Seletor de Colégio -->
            <div id="seletorColegio" class="colegio-selector" style="display: none;">
                <div class="colegio-selector-label">Colégio:</div>
                <div id="colegioTabs" class="colegio-tabs"></div>
            </div>

            <!-- Nome do Colégio Ativo -->
            <div id="colegioAtivo" class="colegio-ativo-header" style="display: none;">
                <span id="colegioAtivoNome"></span>
            </div>

            <!-- Turmas -->
            <section class="section">
                <div class="section-header">
                    <h2>Turmas</h2>
                    <span id="totalTurmas" class="section-count"></span>
                </div>
                <div id="turmas" class="cards-grid"></div>
            </section>

            <!-- Disciplinas -->
            <section class="section">
                <div class="section-header">
                    <h2>Disciplinas</h2>
                    <span id="totalDisciplinas" class="section-count"></span>
                </div>
                <div id="disciplinas" class="cards-grid"></div>
            </section>

            <!-- Livros de Classe -->
            <section class="section">
                <div class="section-header">
                    <h2>Livros de Classe</h2>
                    <span id="totalLivros" class="section-count"></span>
                </div>
                <div id="livros" class="cards-grid"></div>
            </section>
        </div>

        <div id="erro" class="erro" style="display: none;">
            <p id="erroMensagem"></p>
            <button id="btnVoltar" class="btn-primary">Voltar para Login</button>
        </div>
    </main>

    <!-- Modal Alunos -->
    <div id="modalAlunos" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitulo">Alunos</h2>
                <button class="modal-close" onclick="fecharModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="listaAlunos" class="lista-alunos"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
