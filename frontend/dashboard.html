<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCO Digital - Painel</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="materiais.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>RCO Digital</h1>
            <nav class="nav-menu">
                <a href="dashboard.html" class="active">Turmas</a>
                <a href="materiais.html">Materiais</a>
                <a href="emprestimos.html">Empréstimos</a>
            </nav>
            <button id="btnLogout" class="btn-logout">Sair</button>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Carregando seus dados...</p>
        </div>

        <div id="content" class="content" style="display: none;">
            <section class="section">
                <h2>Turmas</h2>
                <div id="turmas" class="cards-grid"></div>
            </section>

            <section class="section">
                <h2>Disciplinas</h2>
                <div id="disciplinas" class="cards-grid"></div>
            </section>

            <section class="section">
                <h2>Livros de Classe</h2>
                <div id="livros" class="cards-grid"></div>
            </section>

            <section class="section">
                <h2>Dados Completos (JSON)</h2>
                <div id="dadosCompletos" class="dados-json"></div>
            </section>
        </div>

        <div id="erro" class="erro" style="display: none;">
            <p id="erroMensagem"></p>
            <button id="btnVoltar" class="btn-primary">Voltar para Login</button>
        </div>
    </main>

    <div id="modalAlunos" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitulo">Alunos</h2>
                <button class="modal-close" onclick="fecharModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="listaAlunos" class="lista-alunos"></div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
