<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCO Digital - Proxy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>RCO Digital - Proxy</h1>
            <p>Configure suas credenciais para acesso automático</p>
        </header>

        <div class="card">
            <h2>Configuração de Credenciais</h2>
            <form id="configForm">
                <div class="form-group">
                    <label for="cpf">CPF (apenas números)</label>
                    <input type="text" id="cpf" name="cpf" placeholder="00000000000" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>
                <button type="submit" id="btnSalvar">Salvar e Conectar</button>
            </form>
            <div id="mensagem" class="mensagem"></div>
        </div>

        <div class="card">
            <h2>Status do Sistema</h2>
            <div id="status">
                <p>Carregando...</p>
            </div>
            <button id="btnAtualizar" class="btn-secondary">Atualizar Status</button>
        </div>

        <div class="card">
            <h2>Dados de Acessos</h2>
            <button id="btnAcessos" class="btn-primary">Buscar Acessos</button>
            <div id="acessos" class="dados"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
