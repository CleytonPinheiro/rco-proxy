<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="theme.js"></script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="theme.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGest — Frequências</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="frequencias.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>📚 EduGest</h1>
            <nav class="nav-menu">
                <a href="dashboard.html">Turmas</a>
                <a href="frequencias.html" class="active">Frequências</a>
                <a href="crachas.html">Crachás</a>
                <a href="grupos.html">Grupos</a>
                <a href="comportamento.html">Comportamento</a>
                <a href="materiais.html">Materiais</a>
                <a href="emprestimos.html">Empréstimos</a>
                <a href="presenca.html">Presença</a>
                <a href="cozinha.html">🍽 Cozinha</a>
            </nav>
            <div class="header-actions">
                <button class="btn-theme" onclick="toggleTheme()">🌙</button>
                <button id="btnLogout" class="btn-logout" onclick="window.location.href='/'">Sair</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Carregando disciplinas...</p>
        </div>

        <div id="content" class="content" style="display: none;">
            <div class="page-header-freq">
                <h2>Frequências por Disciplina</h2>
                <div class="freq-periodo-badge">1º Trimestre · 2026</div>
            </div>

            <!-- Accordion de disciplinas -->
            <div id="listaDiscDisciplinas" class="disc-accordion"></div>
        </div>

        <div id="erro" class="freq-erro" style="display:none;">
            <span id="erroMsg"></span>
        </div>
    </main>

    <script src="frequencias.js"></script>
</body>
</html>
